              "src/hooks/useSettingsForm.ts",
              '''        preserveCodexOfficialAuthOnSwitch:
          serverData.preserveCodexOfficialAuthOnSwitch ?? false,
        unifyCodexSessionHistory: serverData.unifyCodexSessionHistory ?? false,''',
              '''        preserveCodexOfficialAuthOnSwitch:
          serverData.preserveCodexOfficialAuthOnSwitch ?? false,
        enableCodexImageGeneration: serverData.enableCodexImageGeneration ?? false,
        unifyCodexSessionHistory: serverData.unifyCodexSessionHistory ?? false,''',
          )

          # 4. i18n labels
          locale_text = {
              "src/i18n/locales/zh.json": (
                  "启用生图功能",
                  "开启后允许 Codex 请求携带 Responses API 的 image_generation 工具；如果第三方中转站不支持生图，请关闭此项。",
              ),
              "src/i18n/locales/zh-TW.json": (
                  "啟用生圖功能",
                  "開啟後允許 Codex 請求攜帶 Responses API 的 image_generation 工具；如果第三方中轉站不支援生圖，請關閉此項。",
              ),
              "src/i18n/locales/en.json": (
                  "Enable image generation",
                  "Allow Codex requests to carry the Responses API image_generation tool. Turn this off if a third-party gateway does not support image generation.",
              ),
              "src/i18n/locales/ja.json": (
                  "画像生成を有効にする",
                  "Codex リクエストで Responses API の image_generation ツールを送信できるようにします。サードパーティ中継が画像生成に対応していない場合はオフにしてください。",
              ),
          }
          for path, (title, desc) in locale_text.items():
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if '"enableCodexImageGeneration"' in text:
                  continue
              pattern = r'("preserveCodexOfficialAuthOnSwitchDescription"\s*:\s*"[^"\\]*(?:\\.[^"\\]*)*"\s*,)'
              insert = (
                  r'\1\n'
                  f'    "enableCodexImageGeneration": {json.dumps(title, ensure_ascii=False)},\n'
                  f'    "enableCodexImageGenerationDescription": {json.dumps(desc, ensure_ascii=False)},'
              )
              text, count = re.subn(pattern, insert, text, count=1)
              if count != 1:
                  raise SystemExit(f"failed to insert locale keys in {path}")
              p.write_text(text, encoding="utf-8")

          # 5. Rust settings model and accessor
          replace_once(
              "src-tauri/src/settings.rs",
              '''    #[serde(default)]
    pub preserve_codex_official_auth_on_switch: bool,
    /// Run official Codex providers under the shared "custom" model_provider id''',
              '''    #[serde(default)]
    pub preserve_codex_official_auth_on_switch: bool,
    /// Allow Codex Responses requests to carry image_generation when the upstream supports it.
    /// Defaults to false so third-party gateways that reject the tool remain compatible.
    #[serde(default)]
    pub enable_codex_image_generation: bool,
    /// Run official Codex providers under the shared "custom" model_provider id''',
          )
          replace_once(
              "src-tauri/src/settings.rs",
              '''            enable_failover_toggle: false,
            preserve_codex_official_auth_on_switch: false,
            unify_codex_session_history: false,''',
              '''            enable_failover_toggle: false,
            preserve_codex_official_auth_on_switch: false,
            enable_codex_image_generation: false,
            unify_codex_session_history: false,''',
          )
          replace_once(
              "src-tauri/src/settings.rs",
              '''pub fn preserve_codex_official_auth_on_switch() -> bool {
    settings_store()
        .read()
        .unwrap_or_else(|e| {
            log::warn!("设置锁已毒化，使用恢复值: {e}");
            e.into_inner()
        })
        .preserve_codex_official_auth_on_switch
}

pub fn unify_codex_session_history() -> bool {''',
              '''pub fn preserve_codex_official_auth_on_switch() -> bool {
    settings_store()
        .read()
        .unwrap_or_else(|e| {
            log::warn!("设置锁已毒化，使用恢复值: {e}");
            e.into_inner()
        })
        .preserve_codex_official_auth_on_switch
}

pub fn enable_codex_image_generation() -> bool {
    settings_store()
        .read()
        .unwrap_or_else(|e| {
            log::warn!("设置锁已毒化，使用恢复值: {e}");
            e.into_inner()
        })
        .enable_codex_image_generation
}

pub fn unify_codex_session_history() -> bool {''',
          )

          # 6. Codex Responses tool filtering in the forwarder
          replace_once(
              "src-tauri/src/proxy/forwarder.rs",
              '''        if matches!(app_type, AppType::Codex) {
            self.apply_media_prevention(&mut request_body, provider);
        }

        // 过滤私有参数''',
              '''        if matches!(app_type, AppType::Codex) {
            self.apply_media_prevention(&mut request_body, provider);
            let removed_image_tools = strip_codex_image_generation_tool_if_disabled(
                &mut request_body,
                provider,
                &effective_endpoint,
            );
            if removed_image_tools > 0 {
                log::info!(
                    "[Codex] Stripped {removed_image_tools} image_generation tool(s) for provider={}",
                    provider.id
                );
            }
        }

        // 过滤私有参数''',
          )
          replace_once(
              "src-tauri/src/proxy/forwarder.rs",
              '''impl Drop for ActiveConnectionGuard {
    fn drop(&mut self) {
        // Drop 不能 await：把减量操作调度到 tokio runtime
        let status = self.status.clone();
        if let Ok(handle) = tokio::runtime::Handle::try_current() {
            handle.spawn(async move {
                let mut s = status.write().await;
                s.active_connections = s.active_connections.saturating_sub(1);
            });
        }
        // 没有 runtime 时静默丢失计数（仅 UI 展示用，可接受最终一致性）
    }
}

pub struct RequestForwarder {''',
              '''impl Drop for ActiveConnectionGuard {
    fn drop(&mut self) {
        // Drop 不能 await：把减量操作调度到 tokio runtime
        let status = self.status.clone();
        if let Ok(handle) = tokio::runtime::Handle::try_current() {
            handle.spawn(async move {
                let mut s = status.write().await;
                s.active_connections = s.active_connections.saturating_sub(1);
            });
        }
        // 没有 runtime 时静默丢失计数（仅 UI 展示用，可接受最终一致性）
    }
}

fn strip_codex_image_generation_tool_if_disabled(
    body: &mut Value,
    provider: &Provider,
    endpoint: &str,
) -> usize {
    if !should_strip_codex_image_generation_tool(
        provider,
        endpoint,
        crate::settings::preserve_codex_official_auth_on_switch(),
        crate::settings::enable_codex_image_generation(),
    ) {
        return 0;
    }

    strip_response_tools_by_name(body, "image_generation")
}

fn should_strip_codex_image_generation_tool(
    provider: &Provider,
    endpoint: &str,
    preserve_official_auth: bool,
    enable_image_generation: bool,
) -> bool {
    preserve_official_auth
        && !enable_image_generation
        && is_codex_responses_endpoint(endpoint)
        && provider.category.as_deref() != Some("official")
}

fn is_codex_responses_endpoint(endpoint: &str) -> bool {
    let path = endpoint
        .split_once('?')
        .map_or(endpoint, |(path, _query)| path);

    matches!(
        path,
        "/responses" | "/v1/responses" | "/responses/compact" | "/v1/responses/compact"
    )
}

fn strip_response_tools_by_name(body: &mut Value, blocked_tool: &str) -> usize {
    let Some(obj) = body.as_object_mut() else {
        return 0;
    };

    let Some(tools) = obj.get_mut("tools").and_then(Value::as_array_mut) else {
        return 0;
    };

    let before = tools.len();
    tools.retain(|tool| {
        let tool_type = tool.get("type").and_then(Value::as_str);
        let tool_name = tool.get("name").and_then(Value::as_str);
        tool_type != Some(blocked_tool) && tool_name != Some(blocked_tool)
    });
    let removed = before.saturating_sub(tools.len());

    if tools.is_empty() {
        obj.remove("tools");
    }

    removed
}

pub struct RequestForwarder {''',
          )

          forwarder = Path("src-tauri/src/proxy/forwarder.rs")
          forwarder_text = forwarder.read_text(encoding="utf-8")
          test_module = r'''

#[cfg(test)]
mod codex_response_tool_filter_tests {
    use super::*;
    use serde_json::json;

    fn test_provider(category: Option<&str>) -> Provider {
        Provider {
            id: "test".to_string(),
            name: "Test".to_string(),
            settings_config: json!({}),
            website_url: None,
            category: category.map(ToString::to_string),
            created_at: None,
            sort_index: None,
            notes: None,
            meta: None,
            icon: None,
            icon_color: None,
            in_failover_queue: false,
        }
    }

    #[test]
    fn strips_image_generation_tools() {
        let mut body = json!({
            "tools": [
                {"type": "image_generation"},
                {"type": "function", "name": "shell"}
            ]
        });

        let removed = strip_response_tools_by_name(&mut body, "image_generation");

        assert_eq!(removed, 1);
        assert_eq!(body["tools"].as_array().unwrap().len(), 1);
        assert_eq!(body["tools"][0]["type"], "function");
    }

    #[test]
    fn strips_image_generation_tools_by_name() {
        let mut body = json!({
            "tools": [
                {"type": "function", "name": "image_generation"},
                {"type": "custom", "name": "safe_tool"}
            ]
        });

        let removed = strip_response_tools_by_name(&mut body, "image_generation");

        assert_eq!(removed, 1);
        assert_eq!(body["tools"].as_array().unwrap().len(), 1);
        assert_eq!(body["tools"][0]["name"], "safe_tool");
    }

    #[test]
    fn removes_empty_tools_field_after_filtering() {
        let mut body = json!({"tools": [{"type": "image_generation"}]});

        let removed = strip_response_tools_by_name(&mut body, "image_generation");

        assert_eq!(removed, 1);
        assert!(body.get("tools").is_none());
    }

    #[test]
    fn keeps_normal_function_tools() {
        let mut body = json!({
            "tools": [{"type": "function", "name": "shell"}]
        });

        let removed = strip_response_tools_by_name(&mut body, "image_generation");

        assert_eq!(removed, 0);
        assert_eq!(body["tools"].as_array().unwrap().len(), 1);
    }

    #[test]
    fn does_not_strip_non_responses_endpoints() {
        let provider = test_provider(Some("third_party"));

        assert!(!should_strip_codex_image_generation_tool(
            &provider,
            "/chat/completions",
            true,
            false,
        ));
    }

    #[test]
    fn does_not_strip_official_provider() {
        let provider = test_provider(Some("official"));

        assert!(!should_strip_codex_image_generation_tool(
            &provider,
            "/responses",
            true,
            false,
        ));
    }

    #[test]
    fn image_generation_toggle_allows_tool() {
        let provider = test_provider(Some("third_party"));

        assert!(!should_strip_codex_image_generation_tool(
            &provider,
            "/v1/responses",
            true,
            true,
        ));
    }

    #[test]
    fn preserve_official_auth_toggle_gates_filtering() {
        let provider = test_provider(Some("third_party"));

        assert!(!should_strip_codex_image_generation_tool(
            &provider,
            "/v1/responses",
            false,
            false,
        ));
    }
}
'''
          if "mod codex_response_tool_filter_tests" not in forwarder_text:
