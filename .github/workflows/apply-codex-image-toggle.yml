name: Apply Codex image generation toggle

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'one-shot codex image toggle patch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply source patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f"pattern not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          # 1. Frontend settings UI
          replace_once(
              "src/components/settings/CodexAuthSettings.tsx",
              'import { History, KeyRound } from "lucide-react";',
              'import { History, Image, KeyRound } from "lucide-react";',
          )
          replace_once(
              "src/components/settings/CodexAuthSettings.tsx",
              '''        onCheckedChange={(value) =>
          onChange({ preserveCodexOfficialAuthOnSwitch: value })
        }
      />

      <ToggleRow
        icon={<History className="h-4 w-4 text-sky-500" />}''',
              '''        onCheckedChange={(value) =>
          onChange({ preserveCodexOfficialAuthOnSwitch: value })
        }
      />

      <ToggleRow
        icon={<Image className="h-4 w-4 text-violet-500" />}
        title={t("settings.enableCodexImageGeneration")}
        description={t("settings.enableCodexImageGenerationDescription")}
        checked={settings.enableCodexImageGeneration ?? false}
        disabled={!(settings.preserveCodexOfficialAuthOnSwitch ?? false)}
        onCheckedChange={(value) =>
          onChange({ enableCodexImageGeneration: value })
        }
      />

      <ToggleRow
        icon={<History className="h-4 w-4 text-sky-500" />}''',
          )

          # 2. Frontend settings types
          replace_once(
              "src/types.ts",
              '''  // Preserve Codex ChatGPT login in auth.json when switching third-party providers
  preserveCodexOfficialAuthOnSwitch?: boolean;
  // Run official Codex under the shared "custom" provider id so future''',
              '''  // Preserve Codex ChatGPT login in auth.json when switching third-party providers
  preserveCodexOfficialAuthOnSwitch?: boolean;
  // Allow Codex Responses requests to keep the image_generation tool when compatible
  enableCodexImageGeneration?: boolean;
  // Run official Codex under the shared "custom" provider id so future''',
          )

          # 3. Frontend form defaults
          replace_once(
              "src/hooks/useSettingsForm.ts",
              '''      preserveCodexOfficialAuthOnSwitch:
        data.preserveCodexOfficialAuthOnSwitch ?? false,
      unifyCodexSessionHistory: data.unifyCodexSessionHistory ?? false,''',
              '''      preserveCodexOfficialAuthOnSwitch:
        data.preserveCodexOfficialAuthOnSwitch ?? false,
      enableCodexImageGeneration: data.enableCodexImageGeneration ?? false,
      unifyCodexSessionHistory: data.unifyCodexSessionHistory ?? false,''',
